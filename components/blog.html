    <!-- Blog -->
      <section id="blog" style="background: var(--bg-light)">
        <div class="container">
          <h2 class="section-title">Blog</h2>
          <div class="stats-grid">
            <div class="stat-card" style="text-align: left">
              <div class="stat-icon" style="font-size: 2rem">
                <i class="fas fa-newspaper"></i>
              </div>
              <h3 style="color: var(--primary-color); margin-bottom: 1rem">
                Últimas Notícias
              </h3>
              <p style="color: var(--text-light)">
                Acompanhe nossas atividades, eventos e novidades.
              </p>
              <div
                class="btn-primary"
                style="
                  margin-top: 1.5rem;
                  padding: 0.7rem 1.5rem;
                  font-size: 0.9rem;
                "
              >
                Acessar Blog
              </div>
            </div>
            <div class="stat-card" style="text-align: left">
              <div class="stat-icon" style="font-size: 2rem">
                <i class="fas fa-calendar-alt"></i>
              </div>
              <h3 style="color: var(--primary-color); margin-bottom: 1rem">
                Próximos Eventos
              </h3>
              <p style="color: var(--text-light)">
                Fique por dentro da nossa agenda de atividades.
              </p>
              <div
                class="btn-primary"
                style="
                  margin-top: 1.5rem;
                  padding: 0.7rem 1.5rem;
                  font-size: 0.9rem;
                "
              >
                Ver Eventos
              </div>
            </div>
            <div class="stat-card" style="text-align: left">
              <div class="stat-icon" style="font-size: 2rem">
                <i class="fas fa-images"></i>
              </div>
              <h3 style="color: var(--primary-color); margin-bottom: 1rem">
                Galeria de Fotos
              </h3>
              <p style="color: var(--text-light)">
                Momentos especiais da nossa instituição.
              </p>
              <div
                class="btn-primary"
                style="
                  margin-top: 1.5rem;
                  padding: 0.7rem 1.5rem;
                  font-size: 0.9rem;
                "
              >
                Ver Galeria
              </div>
            </div>
          </div>
        </div>
      </section>
